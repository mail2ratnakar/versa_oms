name: Migration Check

on:
  pull_request:
    paths:
      - "migrations/**"
      - "db/**"
      - "implementation/DATABASE_SCHEMA_REGISTRY.json"
  workflow_dispatch:

jobs:
  migration-check:
    name: Validate migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check migration files
        run: |
          test -d migrations
          echo "Migration folder exists."

      - name: Block destructive migration markers unless approved
        run: |
          if grep -R "DROP TABLE\|DROP COLUMN\|TRUNCATE\|DELETE FROM" migrations; then
            echo "Destructive migration marker found. Manual approval required."
            exit 1
          fi
          echo "No destructive migration markers found."

      - name: Generate migration dry-run report
        run: |
          mkdir -p deployment/reports
          echo "migration_check=passed" > deployment/reports/migration-check.txt
