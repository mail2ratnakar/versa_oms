<style>
  /* ---- Finverse Liquid Glass tokens (mirror of app/globals.css) ---- */
  :root{
    --ink:#070809; --action:#1042ff; --attention:#f43f2e; --highlight:#ffc72c;
    --canvas:#edf0f3; --border:#b2b5c3; --muted:#959789; --charcoal:#565a5e;
    --mint:#d8f4ea; --sky:#bfe7e6; --cream:#f1e4cd;
    --glass:rgba(255,255,255,.74); --glass-strong:rgba(255,255,255,.9);
    --glass-border:rgba(178,181,195,.42); --shadow:0 24px 64px rgba(7,8,9,.1);
    --r-sm:12px; --r-md:18px; --r-lg:28px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    color:var(--ink); font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
    min-height:100vh;
    background:
      radial-gradient(circle at 84% 5%, rgba(216,244,234,.86), transparent 30%),
      radial-gradient(circle at 12% 12%, rgba(191,231,230,.68), transparent 26%),
      radial-gradient(circle at 15% 84%, rgba(241,228,205,.72), transparent 34%),
      linear-gradient(135deg,#f8faf8 0%,#edf0f3 52%,#d8f4ea 100%);
    background-attachment:fixed;
  }
  h1{font-size:clamp(26px,3vw,38px);font-weight:850;letter-spacing:-.055em;margin:0}
  h2{font-size:19px;font-weight:800;letter-spacing:-.04em;margin:0 0 6px}
  h3{font-size:15px;font-weight:800;margin:18px 0 8px;letter-spacing:-.02em}
  p,li{line-height:1.62;color:var(--charcoal);font-size:14px}
  code{background:rgba(16,66,255,.08);color:#0b2; padding:1px 6px;border-radius:6px;font-size:12.5px;color:#143}

  .shell{display:grid;grid-template-columns:264px 1fr;min-height:100vh}
  /* ---- Sidebar ---- */
  .sidebar{
    margin:16px 0 16px 16px;padding:20px 14px;border-radius:var(--r-lg);
    background:var(--glass);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
    border:1px solid var(--glass-border);box-shadow:var(--shadow);
    position:sticky;top:16px;height:calc(100vh - 32px);overflow:auto;
  }
  .brand{font-weight:850;font-size:19px;letter-spacing:-.04em}
  .portal-label{font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);margin:2px 0 14px}
  .group-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.13em;color:var(--muted);margin:14px 6px 6px}
  .nav-item{
    display:flex;align-items:center;gap:10px;width:100%;text-align:left;cursor:pointer;
    border:0;background:transparent;font:inherit;color:var(--charcoal);
    padding:8px 10px;border-radius:var(--r-sm);margin:1px 0;transition:.18s;
  }
  .nav-item:hover{background:rgba(255,255,255,.6);color:var(--ink)}
  .nav-item.active{background:var(--ink);color:#fff;font-weight:650}
  .nav-item .ic{font-size:15px;width:20px;text-align:center}
  .nav-item .nd{margin-left:auto;width:6px;height:6px;border-radius:50%;background:var(--highlight);opacity:0}
  .nav-item.active .nd{opacity:1}

  /* ---- Content ---- */
  .content{padding:30px 34px;max-width:1040px}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);font-weight:700}
  .eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--action)}
  .hero{padding:22px 24px;border-radius:var(--r-lg);background:var(--glass-strong);border:1px solid var(--glass-border);box-shadow:var(--shadow);margin-bottom:22px}
  .card{padding:18px 20px;border-radius:var(--r-md);background:var(--glass);border:1px solid var(--glass-border);box-shadow:0 14px 40px rgba(7,8,9,.06);margin:14px 0}
  .chip{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:700;letter-spacing:.01em}
  .chip-green{background:rgba(40,160,110,.16);color:#1f7a52}
  .chip-yellow{background:rgba(255,199,44,.22);color:#937100}
  .chip-blue{background:rgba(16,66,255,.12);color:#1042ff}
  .chip-red{background:rgba(244,63,46,.14);color:#c5341f}
  .chip-muted{background:rgba(149,151,137,.18);color:#5b5d52}

  /* ---- Flow diagram ---- */
  .flow{display:flex;flex-direction:column;align-items:center;margin:8px 0 6px}
  .node{
    display:flex;align-items:center;gap:14px;width:min(560px,100%);
    padding:14px 18px;border-radius:var(--r-md);background:var(--glass-strong);
    border:1px solid var(--glass-border);box-shadow:0 14px 40px rgba(7,8,9,.07);
  }
  .node .ic{font-size:24px;width:42px;height:42px;display:grid;place-items:center;border-radius:12px;background:rgba(255,255,255,.7);border:1px solid var(--glass-border)}
  .node .nl{font-weight:800;font-size:15px;letter-spacing:-.02em}
  .node .ns{font-size:12.5px;color:var(--muted)}
  .node.hl{border-color:rgba(16,66,255,.5);box-shadow:0 18px 48px rgba(16,66,255,.18)}
  .node.hl .ic{background:var(--action);color:#fff;border-color:transparent}
  .node.future{opacity:.62;border-style:dashed}
  .connector{width:3px;height:24px;background:linear-gradient(var(--action),var(--sky));border-radius:3px;transform-origin:top}
  .fan-label{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:700;margin:6px 0}
  .fan{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;width:min(720px,100%)}
  .fan .node{width:220px;flex-direction:column;align-items:flex-start;gap:8px}
  .tone-green .ic{background:rgba(40,160,110,.16)}
  .tone-yellow .ic{background:rgba(255,199,44,.22)}
  .tone-muted .ic{background:rgba(149,151,137,.18)}
  table.kv{width:100%;border-collapse:collapse;margin:6px 0}
  table.kv td{padding:7px 10px;border-bottom:1px solid var(--glass-border);font-size:13px;vertical-align:top}
  table.kv td:first-child{font-weight:700;width:38%;color:var(--ink)}
  ul{margin:6px 0 6px 2px;padding-left:18px}
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="brand">Versa Olympiads</div>
    <div class="portal-label">Training Console</div>
    <nav id="nav"></nav>
  </aside>
  <main class="content" id="content"></main>
</div>

<script>
/* =====================================================================
   TRAINING DATA — modular & maintainable.
   To add/extend a module's manual: add or edit its entry in TRAINING below.
   - `summary`  : one-line purpose (shown under the title)
   - `status`   : {label, tone}  tone = green|yellow|blue|muted
   - `flow`     : optional array of stages for the animated diagram
                  stage = {icon,label,sub,tone?,hl?,future?}  OR  {fan:[...stages], label}
   - `manual`   : HTML string (the training body)
   Sidebar items come from NAV. A module with no TRAINING entry shows a stub.
   ===================================================================== */
const NAV = [
  ["Operations", [
    ["company_dashboard","Dashboard","📊"],
    ["staff_users","Staff Users","👥"],
    ["roles_permissions","Roles & Permissions","🔑"],
    ["school_crm","School CRM","🎯"],
    ["school_onboarding_ops","School Onboarding","🏫"],
    ["student_roster_ops","Student Rosters","📋"],
    ["finance_ops","Finance","💰"],
    ["exam_slot_ops","Exam Slots","📅"],
    ["exam_material_ops","Exam Materials","📦"],
    ["courier_ops","Courier","🚚"],
    ["evaluation_ops","Evaluation","✍️"],
    ["results_ops","Results","📈"],
    ["certificate_ops","Certificates","🎓"],
    ["notification_ops","Notifications","🔔"],
    ["support_tickets","Support","💬"],
    ["task_work_queue","Tasks","✅"],
    ["reports_exports","Reports","📤"],
    ["admin_settings","Admin Settings","⚙️"],
    ["security_audit_console","Security & Audit","🛡️"],
  ]],
];

const TRAINING = {
  school_crm: {
    summary: "Cold-outreach school leads, pipeline, and conversion into onboarding.",
    status: {label:"Built · CHAIN-001 live", tone:"green"},
    flow: [
      {icon:"📋", label:"Lead created", sub:"stage = new_lead", tone:"blue"},
      {icon:"🔄", label:"Pipeline", sub:"contacted → demo → proposal"},
      {icon:"⚡", label:"Convert", sub:"POST /crm/[id]/convert", hl:true},
      {fan:"Effects (post-conditions)", nodes:[
        {icon:"🏫", label:"School created", sub:"schools table", tone:"green"},
        {icon:"📂", label:"Onboarding case", sub:"status = submitted", tone:"yellow"},
        {icon:"✅", label:"Review task", sub:"→ Onboarding queue", tone:"green"},
      ]},
      {icon:"📊", label:"Dashboard + queue update", sub:"Onboarding KPI +1"},
      {icon:"🛡️", label:"Audit written", sub:"convert_lead + open_case", tone:"green"},
      {icon:"🔓", label:"Approve → Activate → Portal", sub:"CHAIN-002 (next)", future:true},
    ],
    manual: `
      <h2>What this module is for</h2>
      <p>Versa sends cold emails to schools. Each interested school becomes a <b>lead</b>. Staff move the lead
      through a sales pipeline and, when the school commits, <b>convert</b> it — which spins up the school record
      and hands it to the onboarding team.</p>

      <h3>The screen</h3>
      <ul>
        <li><b>Leads tab</b> — table of leads with a <b>Stage</b> dropdown, a status chip, and row actions.</li>
        <li><b>Import tab</b> — paste a list (name, city, email, phone); duplicates are detected and skipped.</li>
        <li><b>New lead</b> — create one lead (school name, city, state, lead source).</li>
      </ul>

      <h3>Row actions</h3>
      <table class="kv">
        <tr><td>Stage ▾</td><td>Advance the pipeline: new_lead → contacted → demo → proposal → …</td></tr>
        <tr><td>Comms</td><td>View / add interaction notes (call, email).</td></tr>
        <tr><td>Assign</td><td>Set the owning sales executive.</td></tr>
        <tr><td>Convert</td><td>Commit the school — runs the full effect chain (right).</td></tr>
        <tr><td>Lost</td><td>Mark dead — a <b>reason is mandatory</b>.</td></tr>
      </table>
      <p><span class="chip chip-muted">Rule</span> Once a lead is <b>converted</b> or <b>lost</b>, its actions are
      locked (no double-convert, no stage edits) — only Comms stays open.</p>

      <h3>What "Convert" does (CHAIN-001)</h3>
      <p>Convert is never just a status flip — it triggers six post-conditions:</p>
      <table class="kv">
        <tr><td>1 · Lead</td><td>status &amp; stage → <code>converted</code>, linked to the new school</td></tr>
        <tr><td>2 · School</td><td>a row is created in <code>schools</code></td></tr>
        <tr><td>3 · Onboarding</td><td>a case opens at <code>submitted</code>, linked to school + lead</td></tr>
        <tr><td>4 · Task</td><td>a review task is filed into the Onboarding queue</td></tr>
        <tr><td>5 · Dashboard</td><td>the "Onboarding cases" KPI and the onboarding list update</td></tr>
        <tr><td>6 · Audit</td><td>append-only events for the convert and the case-open</td></tr>
      </table>

      <h3>Reconciliation (how to read the counts)</h3>
      <p>One converted lead → one school → one onboarding case. So if CRM shows 2 converted leads, expect
      <b>2 schools</b> and <b>2 onboarding cases</b>. (A lead converted before this chain existed was backfilled
      so the numbers line up.)</p>

      <h3>Journey acceptance (how we know it works)</h3>
      <p>An automated journey test creates a lead, converts it, and asserts the onboarding queue grew by one with a
      <code>submitted</code> case linked back to the lead — run against the live database. Green only when that passes.</p>
    `,
  },
  school_onboarding_ops: {
    summary: "Verify, approve and activate a converted school.",
    status: {label:"Built · CHAIN-002 next", tone:"yellow"},
    flow: [
      {icon:"📂", label:"Case opened", sub:"submitted (from CRM convert)", tone:"yellow"},
      {icon:"🔍", label:"Review", sub:"approve / reject / request info"},
      {icon:"👍", label:"Approve", sub:"reason required → approved", hl:true},
      {icon:"🔓", label:"Activate", sub:"portal access + roster upload", future:true},
    ],
    manual: `
      <h2>What this module is for</h2>
      <p>When a CRM lead converts, an onboarding <b>case</b> lands here. The onboarding team verifies the school and
      decides: approve, reject, ask for more info, or block.</p>
      <h3>Lifecycle (only valid steps are shown per status)</h3>
      <table class="kv">
        <tr><td>submitted</td><td>→ approve (reason) · reject (reason) · block</td></tr>
        <tr><td>approved</td><td>→ activate (CHAIN-002) · suspend · block</td></tr>
        <tr><td>rejected</td><td>→ archive</td></tr>
        <tr><td>blocked / suspended</td><td>→ resume / archive</td></tr>
      </table>
      <p><span class="chip chip-muted">Rule</span> The server enforces these edges — e.g. you cannot "submit" an
      already-submitted case; the button isn't shown and the API rejects it.</p>
      <p><span class="chip chip-yellow">Next</span> CHAIN-002 wires <b>activate → school portal access + roster upload unlocked + school notified</b>.</p>
    `,
  },
};

/* ---- generic stub for modules not yet documented ---- */
function stub(label){
  return {
    summary:"Training manual is being written as we build this module.",
    status:{label:"Scaffolded", tone:"muted"},
    manual:`<div class="card"><h2>${label}</h2>
      <p>This module exists with its data model, CRUD, role-based access, masking, audited transitions and
      assignment scope. Its detailed effects + screen + journey manual will appear here as we complete it in the
      build loop.</p>
      <p><span class="chip chip-muted">Status</span> Structure ready · behavior/UI polish pending.</p></div>`,
  };
}

/* ---------------- rendering ---------------- */
const labelOf = {};
NAV.forEach(([,items])=>items.forEach(([id,label,ic])=>labelOf[id]={label,ic}));

function buildNav(){
  const nav = document.getElementById("nav");
  NAV.forEach(([group,items])=>{
    const gl=document.createElement("div"); gl.className="group-label"; gl.textContent=group; nav.appendChild(gl);
    items.forEach(([id,label,ic])=>{
      const b=document.createElement("button"); b.className="nav-item"; b.dataset.id=id;
      b.innerHTML=`<span class="ic">${ic}</span><span>${label}</span><span class="nd"></span>`;
      b.onclick=()=>select(id); nav.appendChild(b);
    });
  });
}

function nodeEl(s){
  const el=document.createElement("div");
  el.className="node"+(s.hl?" hl":"")+(s.future?" future":"")+(s.tone?` tone-${s.tone}`:"");
  el.innerHTML=`<div class="ic">${s.icon}</div><div><div class="nl">${s.label}</div><div class="ns">${s.sub||""}</div></div>`;
  return el;
}
function renderFlow(host, flow){
  const targets=[];
  flow.forEach((stage,i)=>{
    if(i>0){const c=document.createElement("div");c.className="connector";host.appendChild(c);targets.push(c);}
    if(stage.fan){
      const fl=document.createElement("div");fl.className="fan-label";fl.textContent=stage.fan;host.appendChild(fl);
      const wrap=document.createElement("div");wrap.className="fan";
      stage.nodes.forEach(n=>{const e=nodeEl(n);wrap.appendChild(e);targets.push(e);});
      host.appendChild(wrap);
    }else{const e=nodeEl(stage);host.appendChild(e);targets.push(e);}
  });
  anime.set(targets,{opacity:0,translateY:14});
  anime({targets,opacity:[0,1],translateY:[14,0],scale:[.96,1],delay:anime.stagger(110),duration:560,easing:"easeOutCubic"});
}

function select(id){
  document.querySelectorAll(".nav-item").forEach(n=>n.classList.toggle("active",n.dataset.id===id));
  const data = TRAINING[id] || stub(labelOf[id].label);
  const c=document.getElementById("content");
  const st=data.status||{label:"",tone:"muted"};
  c.innerHTML=`
    <div class="hero">
      <span class="eyebrow"><span class="dot"></span>training · ${id}</span>
      <h1 style="margin-top:10px">${labelOf[id].ic} ${labelOf[id].label}</h1>
      <p style="margin:8px 0 0">${data.summary||""} &nbsp; <span class="chip chip-${st.tone}">${st.label}</span></p>
    </div>
    ${data.flow?'<div class="card"><h2>Process flow</h2><div class="flow" id="flow"></div></div>':""}
    <div class="manual">${data.manual||""}</div>`;
  anime({targets:".hero, .manual .card, .manual h2, .manual table",opacity:[0,1],translateY:[10,0],delay:anime.stagger(60,{start:80}),duration:520,easing:"easeOutCubic"});
  if(data.flow) renderFlow(document.getElementById("flow"), data.flow);
}

buildNav();
select("school_crm");
</script>
</body>
</html>
