<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Versa Icon Picker (Lucide)</title>
<script src="https://unpkg.com/lucide@0.544.0"></script>
<style>
*{box-sizing:border-box}body{font-family:system-ui,Segoe UI,sans-serif;margin:0;background:#faf8ff;color:#2a2342}
.wrap{display:grid;grid-template-columns:1fr 380px;height:100vh}
.left{padding:20px;overflow:auto}.right{padding:20px;border-left:1px solid #e6e0f5;overflow:auto;background:#fff}
h1{font-size:17px;margin:0 0 12px}.muted{color:#8a82a8;font-size:12px}
#q{width:100%;padding:11px 13px;border:1px solid #e6e0f5;border-radius:11px;font-size:14px;margin:8px 0 14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(94px,1fr));gap:8px}
.ic{display:flex;flex-direction:column;align-items:center;gap:7px;padding:11px 6px;border:1px solid #eee;border-radius:11px;cursor:pointer;background:#fff;font-size:10px;color:#6b6385;text-align:center;word-break:break-all}
.ic:hover{border-color:#7c5cfc;background:#f5f1ff}.ic.sel{border-color:#7c5cfc;background:#efeaff}.ic svg{width:22px;height:22px;color:#3a3357}
.preview{display:flex;gap:10px;align-items:center;margin:10px 0 16px;flex-wrap:wrap;min-height:36px}
.pbtn{display:inline-grid;place-items:center;width:34px;height:34px;border:1px solid #e6e0f5;border-radius:9px;background:#fff;color:#3a3357}
.ppill{display:inline-flex;gap:6px;align-items:center;padding:6px 11px;border-radius:999px;background:#efeaff;color:#7c5cfc;font-size:13px;font-weight:700}
.pbtn svg,.ppill svg{width:16px;height:16px}
.slot{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid #f2eefb;font-size:13px}
.slot .cur,.slot .lu{width:22px;height:22px;display:grid;place-items:center}.slot .cur{color:#b3abc9}.slot .lu{color:#7c5cfc}
.slot .cur svg,.slot .lu svg{width:18px;height:18px}.slot .k{flex:1;font-family:monospace;font-size:12px}
.slot button{font-size:11px;padding:5px 9px;border:1px solid #d9d2ee;border-radius:8px;background:#7c5cfc;color:#fff;cursor:pointer;font-weight:700}
.grp{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:#9a92b5;font-weight:800;margin:16px 0 6px}
textarea{width:100%;height:170px;border:1px solid #e6e0f5;border-radius:11px;font-family:monospace;font-size:11px;padding:11px;margin-top:8px}
.cpy{margin-top:8px;padding:8px 14px;border:0;border-radius:9px;background:#3a3357;color:#fff;font-weight:700;cursor:pointer}
.sel-name{font-weight:800;color:#7c5cfc}
</style></head><body>
<div class="wrap">
  <div class="left"><h1>Lucide icons <span class="muted">— click one to select</span></h1>
    <input id="q" placeholder="Search (e.g. check, ban, mail, user)…" oninput="render()">
    <div class="muted" id="count"></div><div class="grid" id="grid" style="margin-top:10px"></div></div>
  <div class="right"><h1>Assign to our slots</h1>
    <div class="muted">Selected: <span class="sel-name" id="seln">— pick an icon on the left —</span></div>
    <div class="preview" id="prev"></div>
    <div id="slots"></div>
    <div class="grp">Central dictionary — copy &amp; paste back to me</div>
    <textarea id="out" readonly></textarea>
    <button class="cpy" onclick="navigator.clipboard.writeText(document.getElementById('out').value)">Copy JSON</button>
  </div>
</div>
<div style="position:absolute;width:0;height:0;overflow:hidden"><svg width="0" height="0" style="position:absolute"><symbol id="search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></symbol><symbol id="spark" viewBox="0 0 24 24"><path d="M12 2l2 6 6 2-6 2-2 6-2-6-6-2 6-2 2-6Z"/><path d="M19 15l1 3 2 1-2 1-1 3-1-3-2-1 2-1 1-3Z"/></symbol><symbol id="code" viewBox="0 0 24 24"><path d="m8 9-4 3 4 3"/><path d="m16 9 4 3-4 3"/><path d="m14 4-4 16"/></symbol><symbol id="shield" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/><path d="m9 12 2 2 4-5"/></symbol><symbol id="db" viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v6c0 1.7 3.6 3 8 3s8-1.3 8-3V5"/><path d="M4 11v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6"/></symbol><symbol id="user" viewBox="0 0 24 24"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="7" r="4"/></symbol><symbol id="users" viewBox="0 0 24 24"><path d="M17 21a5 5 0 0 0-10 0"/><circle cx="12" cy="8" r="4"/><path d="M22 21a4 4 0 0 0-3-3.8"/><path d="M2 21a4 4 0 0 1 3-3.8"/></symbol><symbol id="globe" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15 15 0 0 1 0 20"/><path d="M12 2a15 15 0 0 0 0 20"/></symbol><symbol id="lock" viewBox="0 0 24 24"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></symbol><symbol id="key" viewBox="0 0 24 24"><circle cx="7" cy="17" r="4"/><path d="M10 14 21 3"/><path d="m21 3-3 0 0 3"/></symbol><symbol id="file" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/></symbol><symbol id="check" viewBox="0 0 24 24"><path d="m20 6-11 11-5-5"/></symbol><symbol id="x" viewBox="0 0 24 24"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></symbol><symbol id="alert" viewBox="0 0 24 24"><path d="M12 9v4"/><path d="M12 17h.01"/><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/></symbol><symbol id="bell" viewBox="0 0 24 24"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"/><path d="M10 21a2 2 0 0 0 4 0"/></symbol><symbol id="settings" viewBox="0 0 24 24"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"/><path d="M19.4 15a1.8 1.8 0 0 0 .4 2l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.8 1.8 0 0 0-2-.4 1.8 1.8 0 0 0-1 1.6V21a2 2 0 1 1-4 0v-.1a1.8 1.8 0 0 0-1-1.6 1.8 1.8 0 0 0-2 .4l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.8 1.8 0 0 0 .4-2 1.8 1.8 0 0 0-1.6-1H3a2 2 0 1 1 0-4h.1a1.8 1.8 0 0 0 1.6-1 1.8 1.8 0 0 0-.4-2l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.8 1.8 0 0 0 2 .4 1.8 1.8 0 0 0 1-1.6V3a2 2 0 1 1 4 0v.1a1.8 1.8 0 0 0 1 1.6 1.8 1.8 0 0 0 2-.4l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.8 1.8 0 0 0-.4 2 1.8 1.8 0 0 0 1.6 1H21a2 2 0 1 1 0 4h-.1a1.8 1.8 0 0 0-1.5 1Z"/></symbol><symbol id="arrow" viewBox="0 0 24 24"><path d="M5 12h14"/><path d="m13 5 7 7-7 7"/></symbol><symbol id="upload" viewBox="0 0 24 24"><path d="M12 16V4"/><path d="m7 9 5-5 5 5"/><path d="M20 16v4H4v-4"/></symbol><symbol id="download" viewBox="0 0 24 24"><path d="M12 4v12"/><path d="m7 11 5 5 5-5"/><path d="M20 20H4"/></symbol><symbol id="calendar" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4"/><path d="M8 3v4"/><path d="M3 11h18"/></symbol><symbol id="chart" viewBox="0 0 24 24"><path d="M4 19V5"/><path d="M4 19h16"/><path d="M8 16V9"/><path d="M13 16V6"/><path d="M18 16v-4"/></symbol><symbol id="route" viewBox="0 0 24 24"><circle cx="6" cy="19" r="3"/><circle cx="18" cy="5" r="3"/><path d="M9 19h2a4 4 0 0 0 0-8h2a4 4 0 0 0 4-4"/></symbol><symbol id="play" viewBox="0 0 24 24"><path d="M8 5v14l11-7Z"/></symbol><symbol id="terminal" viewBox="0 0 24 24"><path d="m4 7 5 5-5 5"/><path d="M12 19h8"/></symbol><symbol id="copy" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><rect x="2" y="2" width="13" height="13" rx="2"/></symbol><symbol id="filter" viewBox="0 0 24 24"><path d="M3 5h18"/><path d="M6 12h12"/><path d="M10 19h4"/></symbol><symbol id="mail" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></symbol><symbol id="grid" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></symbol><symbol id="zap" viewBox="0 0 24 24"><path d="M13 2 3 14h8l-1 8 11-14h-8V2Z"/></symbol><symbol id="link" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.1 0l2-2a5 5 0 0 0-7.1-7.1l-1.1 1.1"/><path d="M14 11a5 5 0 0 0-7.1 0l-2 2a5 5 0 0 0 7.1 7.1l1.1-1.1"/></symbol></svg></div>
<script>
const SLOTS={"ui / nav symbols": ["alert", "arrow", "bell", "calendar", "chart", "check", "code", "copy", "db", "download", "file", "filter", "globe", "grid", "key", "link", "lock", "mail", "play", "route", "search", "settings", "shield", "spark", "terminal", "upload", "user", "users", "x", "zap"], "lifecycle actions": ["approve", "approve_import", "approve_material", "approve_school", "block_school", "cancel", "capacity_full", "change_slot", "close_batch", "complete_import", "confirm_capacity", "confirm_receipt", "correct", "create_link", "fail_import", "finalise", "finish_send", "generate", "issue", "manual_confirm", "mark_bounced", "mark_clicked", "mark_delivered", "mark_failed", "mark_opened", "mark_sent", "mark_unsubscribed", "pause", "provider_pending", "publish", "reconcile", "register_interest", "reject_import", "release_when_due", "reverse", "review_results", "revoke", "schedule", "schedule_release", "select_slot", "start_send", "submit_dispatch", "submit_registration", "upload_omr", "upload_students", "validate", "validate_import", "validate_rows", "webhook_paid", "withhold", "unsubscribe", "resubscribe"]};const MAP={};let SEL=null,NAMES=[];
function kebab(n){return n.replace(/([a-z0-9])([A-Z])/g,'$1-$2').replace(/([A-Z]+)([A-Z][a-z])/g,'$1-$2').toLowerCase();}
function li(kn){const i=document.createElement('i');i.setAttribute('data-lucide',kn);return i;}
function render(){const q=document.getElementById('q').value.toLowerCase();const g=document.getElementById('grid');g.replaceChildren();let shown=0;
  for(const kn of NAMES){if(q&&!kn.includes(q))continue;shown++;const d=document.createElement('div');d.className='ic'+(SEL===kn?' sel':'');d.title=kn;
    d.appendChild(li(kn));const s=document.createElement('span');s.textContent=kn;d.appendChild(s);
    d.onclick=()=>{SEL=kn;document.getElementById('seln').textContent=kn;preview();render();};g.appendChild(d);}
  document.getElementById('count').textContent=shown+' of '+NAMES.length+' icons';lucide.createIcons();}
function preview(){const p=document.getElementById('prev');p.replaceChildren();if(!SEL)return;
  const b=document.createElement('span');b.className='pbtn';b.appendChild(li(SEL));
  const pill=document.createElement('span');pill.className='ppill';pill.appendChild(li(SEL));const t=document.createElement('span');t.textContent=SEL;pill.appendChild(t);
  p.append(b,pill);lucide.createIcons();}
function renderSlots(){const c=document.getElementById('slots');c.replaceChildren();
  for(const grp in SLOTS){const h=document.createElement('div');h.className='grp';h.textContent=grp;c.appendChild(h);
    for(const k of SLOTS[grp]){const row=document.createElement('div');row.className='slot';
      const cur=document.createElement('span');cur.className='cur';const sv=document.createElementNS('http://www.w3.org/2000/svg','svg');const u=document.createElementNS('http://www.w3.org/2000/svg','use');u.setAttribute('href','#'+k);sv.appendChild(u);cur.appendChild(sv);
      const kk=document.createElement('span');kk.className='k';kk.textContent=k;
      const lu=document.createElement('span');lu.className='lu';if(MAP[k])lu.appendChild(li(MAP[k]));
      const btn=document.createElement('button');btn.textContent='set';btn.onclick=()=>{if(!SEL){alert('Pick an icon first');return;}MAP[k]=SEL;out();renderSlots();};
      row.append(cur,kk,lu,btn);c.appendChild(row);}}
  lucide.createIcons();}
function out(){document.getElementById('out').value=JSON.stringify(MAP,null,2);}
function boot(){if(!window.lucide||!lucide.icons){document.getElementById('count').textContent='Lucide failed to load (needs internet for the CDN).';return;}
  NAMES=[...new Set(Object.keys(lucide.icons).map(kebab))].sort();render();renderSlots();out();}
window.addEventListener('load',()=>setTimeout(boot,250));
</script></body></html>
