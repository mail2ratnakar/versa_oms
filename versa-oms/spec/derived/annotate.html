<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Versa — Flow Annotator</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:system-ui,Segoe UI,sans-serif;color:#2a2342;background:#faf8ff;height:100vh;overflow:hidden}
.top{display:flex;align-items:center;gap:9px;padding:9px 14px;border-bottom:1px solid #e6e0f5;background:#fff;flex-wrap:wrap}
.top b{font-size:14px}.top select,.top .btn{padding:7px 10px;border:1px solid #e6e0f5;border-radius:9px;font-size:13px;background:#fff;cursor:pointer}
.btn.on{background:#7c5cfc;color:#fff;border-color:#7c5cfc;font-weight:700}.btn.dark{background:#3a3357;color:#fff;border:0}.btn:disabled{opacity:.4;cursor:default}
.muted{color:#8a82a8;font-size:12px}
.wrap{display:grid;grid-template-columns:1fr 6px 360px;height:calc(100vh - 50px)}
.stage{overflow:auto;position:relative;background:#e9e4f5}
.divider{background:#e6e0f5;cursor:col-resize}.divider:hover{background:#cdbcff}
.canvas{position:relative;min-height:100%}
iframe#pg{border:0;background:#fff;display:block;transform-origin:top left}
#ov{position:absolute;inset:0;z-index:2}#ov.add{cursor:crosshair}
.pin{position:absolute;z-index:3;transform:translate(-50%,-50%)}
.pin .num{display:grid;place-items:center;width:26px;height:26px;border-radius:50%;color:#fff;font-weight:800;font-size:13px;box-shadow:0 2px 8px rgba(80,40,160,.4);cursor:grab;border:2px solid #fff}
.pin .box{position:absolute;left:34px;top:-6px;width:210px;background:#2a2342;color:#fff;border-radius:9px;padding:7px 9px;box-shadow:0 6px 20px rgba(20,12,40,.3)}
.pin .box.flip{left:auto;right:34px}
.pin .box::before{content:'';position:absolute;left:-6px;top:9px;border:6px solid transparent;border-right-color:#2a2342}
.pin .box.flip::before{left:auto;right:-6px;border-right-color:transparent;border-left-color:#2a2342}
.pin .box select{width:100%;background:#3a3357;color:#fff;border:0;border-radius:6px;font-size:11px;padding:3px;margin-bottom:5px}
.pin .box textarea{width:100%;background:transparent;border:0;color:#fff;font:inherit;font-size:12px;resize:vertical;outline:none;min-height:32px}
.pin .box .donebtn{margin-top:6px;background:#7c5cfc;color:#fff;border:0;border-radius:6px;padding:4px 14px;font-size:11px;font-weight:800;cursor:pointer}
.side{border-left:1px solid #e6e0f5;background:#fff;overflow:auto;padding:13px;display:flex;flex-direction:column;gap:8px}
.side h3{font-size:13px;margin:0}
.scrhdr{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#9a92b5;font-weight:800;margin:12px 0 3px;border-top:1px solid #f2eefb;padding-top:8px}
.row{display:flex;gap:8px;align-items:flex-start;padding:6px 0;font-size:12.5px;cursor:pointer;border-radius:7px}
.row:hover{background:#f6f2ff}.row .n{width:21px;height:21px;border-radius:50%;color:#fff;display:grid;place-items:center;font-size:11px;font-weight:800;flex:0 0 auto}
.row .tag{font-size:9px;font-weight:800;text-transform:uppercase;border-radius:5px;padding:1px 5px;color:#fff;margin-left:4px}
.row .sel{color:#9a92b5;font-size:10.5px;font-family:monospace}.pin.hist{opacity:.55;filter:grayscale(1);pointer-events:none}.pin.hist .num{background:#a8a8a8!important;box-shadow:none}.row.hist{opacity:.6}.row.hist:hover{background:#f2f2f5}.scrhdr.hist{color:#b3b3b3;font-style:italic}
textarea#out{width:100%;height:150px;font-family:monospace;font-size:11px;border:1px solid #e6e0f5;border-radius:9px;padding:9px}
</style></head><body>
<div class="top"><b>Flow Annotator</b>
  <button class="btn" id="prev" onclick="step(-1)">&larr; Prev</button>
  <select id="pick" onchange="goScreen(this.value)"><option value="/public/register.html">Public · register — Register your school for the Olympiad</option><option value="/staff/OJ1.html">Staff · OJ1 — Operations dashboard</option><option value="/staff/OJ-OLY.html">Staff · OJ-OLY — Olympiads</option><option value="/staff/OJ-AK.html">Staff · OJ-AK — Answer keys</option><option value="/staff/OJ-SR.html">Staff · OJ-SR — Study resources</option><option value="/staff/OJ-O1.html">Staff · OJ-O1 — Import directory</option><option value="/staff/OJ-O2.html" selected>Staff · OJ-O2 — School directory</option><option value="/staff/OJ-O3.html">Staff · OJ-O3 — Email campaigns</option><option value="/staff/OJ-O3B.html">Staff · OJ-O3B — Campaign builder</option><option value="/staff/OJ-O4.html">Staff · OJ-O4 — Sends & tracking</option><option value="/staff/OJ3.html">Staff · OJ3 — Reconcile payments</option><option value="/staff/OJ4.html">Staff · OJ4 — Exam slots</option><option value="/staff/OJ5.html">Staff · OJ5 — Release materials</option><option value="/staff/OJ-AD.html">Staff · OJ-AD — Admit cards</option><option value="/staff/OJ6.html">Staff · OJ6 — Receive couriers</option><option value="/staff/OJ-ATT.html">Staff · OJ-ATT — Exam attendance</option><option value="/staff/OJ7.html">Staff · OJ7 — OMR import & match</option><option value="/staff/OJ8.html">Staff · OJ8 — Approve & publish results</option><option value="/staff/OJ9.html">Staff · OJ9 — Generate certificates</option><option value="/staff/OJ-RE.html">Staff · OJ-RE — Re-evaluations</option><option value="/staff/OJ-AUDIT.html">Staff · OJ-AUDIT — Audit log</option><option value="/staff/OJ-AW.html">Staff · OJ-AW — Awards</option><option value="/portal/SJ-SR.html">School · SJ-SR — Study resources</option><option value="/portal/SJ3.html">School · SJ3 — Dashboard</option><option value="/portal/SJ4.html">School · SJ4 — Upload students</option><option value="/portal/SJ5.html">School · SJ5 — Validate & finalise</option><option value="/portal/SJ6.html">School · SJ6 — Payment</option><option value="/portal/SJ7.html">School · SJ7 — Select exam slot</option><option value="/portal/SJ8.html">School · SJ8 — Download materials</option><option value="/portal/SJ-AD.html">School · SJ-AD — Admit cards</option><option value="/portal/SJ9.html">School · SJ9 — Submit courier</option><option value="/portal/SJ10.html">School · SJ10 — Your results</option><option value="/portal/SJ-RE.html">School · SJ-RE — Re-evaluation</option><option value="/portal/SJ11.html">School · SJ11 — Your certificates</option><option value="/portal/SJ1.html">School · SJ1 — Register your school</option><option value="/portal/SJ12.html">School · SJ12 — Verify a certificate</option></select>
  <button class="btn" id="next" onclick="step(1)">Next &rarr;</button>
  <button class="btn" id="addbtn" onclick="toggleAdd()">+ Add step</button>
  <span class="muted" id="hint">click <b>+ Add step</b>, then click the page where it happens · walk screens with Prev/Next</span>
  <input id="flowname" placeholder="flow name" style="margin-left:auto;width:120px;padding:7px 9px;border:1px solid #e6e0f5;border-radius:8px;font-size:12px"><button class="btn dark" onclick="sendToSource()">Send to source</button><button class="btn" onclick="exportJson()">Copy JSON</button>
  <button class="btn" onclick="clearAll()">Clear all</button><button class="btn" onclick="saveHistory()">Save to history</button><button class="btn" onclick="clearHistory()">Clear history</button></div>
<div class="wrap" id="wrap">
  <div class="stage"><div class="canvas" id="canvas"><iframe id="pg"></iframe><div id="ov"></div></div></div>
  <div class="divider" id="divider"></div>
  <div class="side"><h3>Flow steps <span class="muted" id="cnt"></span></h3><div id="list" class="muted">No steps yet.</div>
    <div style="margin-top:auto"><label class="muted">Flow JSON — copy to me</label><textarea id="out" readonly></textarea></div></div>
</div>
<script>
const TYPES=[{"k": "trigger", "c": "#16a34a"}, {"k": "screen", "c": "#7c5cfc"}, {"k": "action", "c": "#2563eb"}, {"k": "validation", "c": "#d97706"}, {"k": "data", "c": "#0891b2"}, {"k": "note", "c": "#eab308"}];const TCOL={};TYPES.forEach(t=>TCOL[t.k]=t.c);
const STEPS=[];let ADD=false,CUR='/staff/OJ-O2.html',EDITING=null,SCALE=1;const DESIGN_W=1280;let HISTORY=[];try{HISTORY=JSON.parse(localStorage.getItem('annot_history')||'[]');}catch(e){}
const ov=document.getElementById('ov'),pg=document.getElementById('pg'),canvas=document.getElementById('canvas'),pick=document.getElementById('pick');
function goScreen(url){CUR=url;pick.value=url;pg.src=url;renderOverlay();syncNav();}
function step(d){const i=pick.selectedIndex+d;if(i<0||i>=pick.options.length)return;goScreen(pick.options[i].value);}
function syncNav(){document.getElementById('prev').disabled=pick.selectedIndex===0;document.getElementById('next').disabled=pick.selectedIndex===pick.options.length-1;}
function fit(){const stage=document.querySelector('.stage');SCALE=Math.min(1,Math.max(.35,(stage.clientWidth-2)/DESIGN_W));pg.style.transform='scale('+SCALE+')';const h=parseFloat(pg.style.height)||1400;canvas.style.width=(DESIGN_W*SCALE)+'px';canvas.style.height=(h*SCALE)+'px';renderOverlay();}
window.addEventListener('resize',fit);
pg.addEventListener('load',()=>{let h=1400;try{h=Math.max(pg.contentDocument.body.scrollHeight,700);}catch(e){}pg.style.width=DESIGN_W+'px';pg.style.height=h+'px';fit();});
function toggleAdd(){ADD=!ADD;if(ADD)EDITING=null;document.getElementById('addbtn').classList.toggle('on',ADD);ov.classList.toggle('add',ADD);renderOverlay();}
function selectorAt(cx,cy){try{const r=pg.getBoundingClientRect();ov.style.pointerEvents='none';let el=pg.contentDocument.elementFromPoint((cx-r.left)/SCALE,(cy-r.top)/SCALE);ov.style.pointerEvents='';let cur=el,best=el;for(let i=0;i<5&&cur;i++){const nm=cur.getAttribute&&cur.getAttribute('name');if(cur.id||nm||['BUTTON','A','INPUT','SELECT','TEXTAREA','TR','TH'].includes(cur.tagName)){best=cur;break;}cur=cur.parentElement;}el=best;if(!el)return'';if(el.id)return'#'+el.id;const nm=el.getAttribute&&el.getAttribute('name');if(nm)return'[name='+nm+']';const t=(el.textContent||'').trim().replace(/\s+/g,' ').slice(0,34);return el.tagName.toLowerCase()+(t?(' “'+t+'”'):'');}catch(e){return'';}}
ov.addEventListener('click',e=>{if(!ADD)return;const rect=canvas.getBoundingClientRect();const p={screen:CUR,label:pick.options[pick.selectedIndex].text,type:'action',x:(e.clientX-rect.left)/SCALE,y:(e.clientY-rect.top)/SCALE,note:'',sel:selectorAt(e.clientX,e.clientY)};STEPS.push(p);EDITING=p;ADD=false;document.getElementById('addbtn').classList.remove('on');ov.classList.remove('add');render();});
function num(p){return STEPS.indexOf(p)+1;}
function renderOverlay(){[...ov.querySelectorAll('.pin')].forEach(e=>e.remove());const w=canvas.clientWidth;
  for(const p of HISTORY){if(p.screen!==CUR)continue;const d=document.createElement('div');d.className='pin hist';d.style.left=(p.x*SCALE)+'px';d.style.top=(p.y*SCALE)+'px';const hn=document.createElement('span');hn.className='num';hn.textContent='•';d.appendChild(hn);ov.appendChild(d);}
  for(const p of STEPS){if(p.screen!==CUR)continue;const d=document.createElement('div');d.className='pin';d.style.left=(p.x*SCALE)+'px';d.style.top=(p.y*SCALE)+'px';
    const n=document.createElement('span');n.className='num';n.style.background=TCOL[p.type]||'#7c5cfc';n.textContent=num(p);n.title='drag to move · click to edit';n.addEventListener('mousedown',ev=>startDrag(ev,p,d));d.appendChild(n);
    if(p===EDITING){const box=document.createElement('div');box.className='box'+(p.x*SCALE>w-260?' flip':'');box.addEventListener('mousedown',ev=>ev.stopPropagation());box.addEventListener('click',ev=>ev.stopPropagation());
      const ts=document.createElement('select');TYPES.forEach(t=>{const o=document.createElement('option');o.value=t.k;o.textContent=t.k;ts.appendChild(o);});ts.value=p.type;ts.addEventListener('change',()=>{p.type=ts.value;renderList();renderOverlay();});
      const ta=document.createElement('textarea');ta.value=p.note;ta.placeholder='what happens here…';ta.addEventListener('input',()=>{p.note=ta.value;renderList();});
      const done=document.createElement('button');done.className='donebtn';done.textContent='Done';done.addEventListener('click',ev=>{ev.stopPropagation();EDITING=null;render();});
      box.append(ts,ta,done);d.appendChild(box);setTimeout(()=>ta.focus(),0);}
    ov.appendChild(d);}}
let drag=null;
function startDrag(ev,p,d){ev.preventDefault();ev.stopPropagation();drag={p,d,moved:false,sx:ev.clientX,sy:ev.clientY};}
window.addEventListener('mousemove',e=>{if(!drag)return;if(Math.abs(e.clientX-drag.sx)>3||Math.abs(e.clientY-drag.sy)>3)drag.moved=true;if(!drag.moved)return;const rect=canvas.getBoundingClientRect();drag.p.x=(e.clientX-rect.left)/SCALE;drag.p.y=(e.clientY-rect.top)/SCALE;drag.d.style.left=(drag.p.x*SCALE)+'px';drag.d.style.top=(drag.p.y*SCALE)+'px';});
window.addEventListener('mouseup',e=>{if(drag){if(!drag.moved){EDITING=drag.p;render();}else{drag.p.sel=selectorAt(e.clientX,e.clientY);renderList();}drag=null;}});
function render(){renderOverlay();renderList();}
function renderList(){const l=document.getElementById('list');document.getElementById('cnt').textContent=STEPS.length?('· '+STEPS.length+' steps'):'';
  l.className='';l.replaceChildren();
  let lastH=null;for(const p of HISTORY){if(p.screen!==lastH){const hh=document.createElement('div');hh.className='scrhdr hist';hh.textContent=p.label+' · saved';l.appendChild(hh);lastH=p.screen;}const hr=document.createElement('div');hr.className='row hist';hr.onclick=()=>{if(p.screen!==CUR)goScreen(p.screen);};const ht=document.createElement('span');ht.style.flex='1';ht.textContent=(p.note||'(empty)')+(p.sel?(' · '+p.sel):'');hr.appendChild(ht);l.appendChild(hr);}
  if(!STEPS.length){if(!HISTORY.length){l.className='muted';l.textContent='No steps yet.';}out();return;}let lastScreen=null;
  for(const p of STEPS){if(p.screen!==lastScreen){const h=document.createElement('div');h.className='scrhdr';h.textContent=p.label;l.appendChild(h);lastScreen=p.screen;}
    const r=document.createElement('div');r.className='row';r.onclick=()=>{if(p.screen!==CUR)goScreen(p.screen);};
    const n=document.createElement('span');n.className='n';n.style.background=TCOL[p.type]||'#7c5cfc';n.textContent=num(p);
    const b=document.createElement('div');b.style.flex='1';const tt=document.createElement('span');tt.className='tag';tt.style.background=TCOL[p.type];tt.textContent=p.type;
    const tx=document.createElement('span');tx.textContent=' '+(p.note||'(empty)');b.append(tt,tx);if(p.sel){const s=document.createElement('div');s.className='sel';s.textContent=p.sel;b.appendChild(s);}
    const x=document.createElement('span');x.style.cursor='pointer';x.style.color='#bbb';x.textContent='×';x.onclick=ev=>{ev.stopPropagation();STEPS.splice(STEPS.indexOf(p),1);render();};
    r.append(n,b,x);l.appendChild(r);}out();}
function out(){document.getElementById('out').value=JSON.stringify({flow:{steps:STEPS.map((p,i)=>({n:i+1,screen:p.screen,type:p.type,note:p.note,selector:p.sel,x:Math.round(p.x),y:Math.round(p.y)}))}},null,2);}
function exportJson(){out();navigator.clipboard.writeText(document.getElementById('out').value);document.getElementById('hint').textContent='copied! paste it here to me';}
function sendToSource(){if(!STEPS.length){document.getElementById('hint').textContent='nothing to send — add steps first';return;}out();const name=(document.getElementById('flowname').value||'flow').trim()||'flow';const payload={name:name,flow:{steps:STEPS.map((p,i)=>({n:i+1,screen:p.screen,type:p.type,note:p.note,selector:p.sel,x:Math.round(p.x),y:Math.round(p.y)}))}};fetch('/api/annotate/import',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(payload)}).then(r=>r.json()).then(j=>{document.getElementById('hint').textContent=j.ok?('✓ folded into source: '+j.name+' ('+j.steps+' steps · '+j.screens+' screens) — regenerate to propagate'):('send failed: '+(j.error||''));}).catch(e=>{document.getElementById('hint').textContent='send failed — is the dev server running?';});}
function clearAll(){if(confirm('Clear ALL steps across all screens?')){STEPS.length=0;render();}}
function saveHistory(){if(!STEPS.length)return;HISTORY=HISTORY.concat(STEPS.map(p=>({screen:p.screen,label:p.label,type:p.type,note:p.note,sel:p.sel,x:p.x,y:p.y})));try{localStorage.setItem('annot_history',JSON.stringify(HISTORY));}catch(e){}STEPS.length=0;EDITING=null;render();document.getElementById('hint').textContent='saved to history ('+HISTORY.length+' total)';}
function clearHistory(){if(confirm('Clear saved annotation history?')){HISTORY=[];try{localStorage.removeItem('annot_history');}catch(e){}render();}}
// resizable split
(function(){const dv=document.getElementById('divider'),wrap=document.getElementById('wrap');let on=false;
  dv.addEventListener('mousedown',()=>{on=true;document.body.style.userSelect='none';});
  window.addEventListener('mousemove',e=>{if(!on)return;let w=window.innerWidth-e.clientX;w=Math.max(260,Math.min(760,w));wrap.style.gridTemplateColumns='1fr 6px '+w+'px';fit();});
  window.addEventListener('mouseup',()=>{on=false;document.body.style.userSelect='';});})();
goScreen('/staff/OJ-O2.html');render();
</script></body></html>
