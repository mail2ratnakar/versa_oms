<!doctype html>
<html lang="en" data-theme="violet">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Users — Versa</title><link rel="stylesheet" href="design.css"></head>
<body>
<div class="shell">
  <aside class="side"><div class="brand"><div class="logo">V</div><div><h1>Versa</h1><p>Operations</p></div></div>
    <nav class="nav"><div class="navlabel">Modules</div><a href="audit_events.html">Audit Events</a><a href="certificates.html">Certificates</a><a href="courier_batches.html">Courier Batches</a><a href="exam_materials.html">Exam Materials</a><a href="exam_slots.html">Exam Slots</a><a href="olympiads.html">Olympiads</a><a href="omr_imports.html">Omr Imports</a><a href="participations.html">Participations</a><a href="payments.html">Payments</a><a href="results.html">Results</a><a href="school_users.html">School Users</a><a href="schools.html">Schools</a><a href="students.html">Students</a><a href="users.html">Users</a></nav></aside>
  <main><header class="top"><div class="search"><input class="input" placeholder="Search Users…"></div>
      <button class="btn primary" onclick="document.getElementById('createCard').scrollIntoView()">New User</button></header>
    <div class="page">
      <section><div class="head"><div><h3>Users</h3><p class="muted">Business records, not raw tables.</p></div></div>
        <div class="tablewrap"><table><thead><tr><th>Email</th><th>Full Name</th><th>Role</th><th>User Status</th></tr></thead><tbody id="rows"></tbody></table></div></section>
      <section id="createCard" class="card"><div class="head"><div><span class="badge success">Create</span>
          <h4>New User</h4></div></div>
        <div class="grid two">
          <div class="field"><label>Email</label><input class="input" name="email"></div>
          <div class="field"><label>Full Name</label><input class="input" name="full_name"></div>
          <div class="field"><label>Role</label><select class="select" name="role"><option>super_admin</option><option>company_admin</option><option>operations_head</option><option>operations_executive</option><option>sales_executive</option><option>school_onboarding_executive</option><option>finance_admin</option><option>finance_executive</option><option>exam_operations_manager</option><option>content_manager</option><option>material_release_manager</option><option>courier_manager</option><option>evaluation_manager</option><option>omr_import_operator</option><option>results_approver</option><option>certificate_manager</option><option>notifications_manager</option><option>support_executive</option><option>security_reviewer</option><option>auditor</option><option>school_coordinator</option><option>school_principal</option></select></div>
          <div class="field"><label>User Status</label><select class="select" name="user_status"><option>invited</option><option>active</option><option>suspended</option><option>disabled</option></select></div>
        </div>
        <div class="flex" style="margin-top:14px"><button class="btn primary" onclick="create()">Create</button>
          <span id="msg" class="muted tiny"></span></div></section>
    </div></main></div>
<script>
const COLS=["email", "full_name", "role", "user_status"];
async function load(){const r=await fetch('/api/users');const j=await r.json();const rows=(j.data||[]);
  document.getElementById('rows').innerHTML=rows.map(x=>'<tr>'+COLS.map(c=>'<td>'+(x[c]??'')+'</td>').join('')+'</tr>').join('')||'<tr><td colspan="9" class="muted">No users yet.</td></tr>';}
async function create(){const input={};document.querySelectorAll('#createCard [name]').forEach(el=>{if(el.value)input[el.name]=el.value;});
  const r=await fetch('/api/users',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(input)});
  const j=await r.json();document.getElementById('msg').textContent=j.ok?'Created.':'Errors: '+JSON.stringify(j.errors||j.code);if(j.ok)load();}
load();
</script>
</body></html>
