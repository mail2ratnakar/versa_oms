<!doctype html>
<html lang="en" data-theme="violet">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Results — Versa</title><link rel="stylesheet" href="design.css"></head>
<body>
<div class="shell">
  <aside class="side"><div class="brand"><div class="logo">V</div><div><h1>Versa</h1><p>Operations</p></div></div>
    <nav class="nav"><div class="navlabel">Modules</div><a href="audit_events.html">Audit Events</a><a href="certificates.html">Certificates</a><a href="courier_batches.html">Courier Batches</a><a href="exam_materials.html">Exam Materials</a><a href="exam_slots.html">Exam Slots</a><a href="olympiads.html">Olympiads</a><a href="omr_imports.html">Omr Imports</a><a href="participations.html">Participations</a><a href="payments.html">Payments</a><a href="results.html">Results</a><a href="school_users.html">School Users</a><a href="schools.html">Schools</a><a href="students.html">Students</a><a href="users.html">Users</a></nav></aside>
  <main><header class="top"><div class="search"><input class="input" placeholder="Search Results…"></div>
      <button class="btn primary" onclick="document.getElementById('createCard').scrollIntoView()">New Result</button></header>
    <div class="page">
      <section><div class="head"><div><h3>Results</h3><p class="muted">Business records, not raw tables.</p></div></div>
        <div class="tablewrap"><table><thead><tr><th>Result Code</th><th>Raw Score</th><th>Max Marks</th><th>Percentage</th><th>School Rank</th><th>Status</th></tr></thead><tbody id="rows"></tbody></table></div></section>
      <section id="createCard" class="card"><div class="head"><div><span class="badge success">Create</span>
          <h4>New Result</h4></div></div>
        <div class="grid two">
          <div class="field"><label>Result Code</label><input class="input" name="result_code"></div>
          <div class="field"><label>Student Id</label><select class="select" name="student_id"><option value="">Select a Student…</option></select></div>
          <div class="field"><label>Participation Id</label><select class="select" name="participation_id"><option value="">Select a Participation…</option></select></div>
          <div class="field"><label>School Id</label><select class="select" name="school_id"><option value="">Select a School…</option></select></div>
          <div class="field"><label>Raw Score</label><input class="input" name="raw_score"></div>
          <div class="field"><label>Max Marks</label><input class="input" name="max_marks"></div>
          <div class="field"><label>Percentage</label><input class="input" name="percentage"></div>
          <div class="field"><label>School Rank</label><input class="input" name="school_rank"></div>
          <div class="field"><label>City Rank</label><input class="input" name="city_rank"></div>
          <div class="field"><label>State Rank</label><input class="input" name="state_rank"></div>
          <div class="field"><label>National Rank</label><input class="input" name="national_rank"></div>
          <div class="field"><label>Award Category</label><input class="input" name="award_category"></div>
        </div>
        <div class="flex" style="margin-top:14px"><button class="btn primary" onclick="create()">Create</button>
          <span id="msg" class="muted tiny"></span></div></section>
    </div></main></div>
<script>
const COLS=["result_code", "raw_score", "max_marks", "percentage", "school_rank", "status"];
async function load(){const r=await fetch('/api/results');const j=await r.json();const rows=(j.data||[]);
  document.getElementById('rows').innerHTML=rows.map(x=>'<tr>'+COLS.map(c=>'<td>'+(x[c]??'')+'</td>').join('')+'</tr>').join('')||'<tr><td colspan="9" class="muted">No results yet.</td></tr>';}
async function create(){const input={};document.querySelectorAll('#createCard [name]').forEach(el=>{if(el.value)input[el.name]=el.value;});
  const r=await fetch('/api/results',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(input)});
  const j=await r.json();document.getElementById('msg').textContent=j.ok?'Created.':'Errors: '+JSON.stringify(j.errors||j.code);if(j.ok)load();}
load();
</script>
</body></html>
