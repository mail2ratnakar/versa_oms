<!doctype html>
<html lang="en" data-theme="violet">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Audit Events — Versa</title><link rel="stylesheet" href="design.css"></head>
<body>
<div class="shell">
  <aside class="side"><div class="brand"><div class="logo">V</div><div><h1>Versa</h1><p>Operations</p></div></div>
    <nav class="nav"><div class="navlabel">Modules</div><a href="audit_events.html">Audit Events</a><a href="certificates.html">Certificates</a><a href="courier_batches.html">Courier Batches</a><a href="exam_materials.html">Exam Materials</a><a href="exam_slots.html">Exam Slots</a><a href="olympiads.html">Olympiads</a><a href="omr_imports.html">Omr Imports</a><a href="participations.html">Participations</a><a href="payments.html">Payments</a><a href="results.html">Results</a><a href="school_users.html">School Users</a><a href="schools.html">Schools</a><a href="students.html">Students</a><a href="users.html">Users</a></nav></aside>
  <main><header class="top"><div class="search"><input class="input" placeholder="Search Audit Events…"></div>
      <button class="btn primary" onclick="document.getElementById('createCard').scrollIntoView()">New Audit Event</button></header>
    <div class="page">
      <section><div class="head"><div><h3>Audit Events</h3><p class="muted">Business records, not raw tables.</p></div></div>
        <div class="tablewrap"><table><thead><tr><th>Trace Id</th><th>Actor Role</th><th>Action</th><th>Entity Name</th><th>Entity Id</th></tr></thead><tbody id="rows"></tbody></table></div></section>
      <section id="createCard" class="card"><div class="head"><div><span class="badge success">Create</span>
          <h4>New Audit Event</h4></div></div>
        <div class="grid two">
          <div class="field"><label>Trace Id</label><input class="input" name="trace_id"></div>
          <div class="field"><label>Actor User Id</label><select class="select" name="actor_user_id"><option value="">Select a User…</option></select></div>
          <div class="field"><label>Actor Role</label><input class="input" name="actor_role"></div>
          <div class="field"><label>Action</label><input class="input" name="action"></div>
          <div class="field"><label>Entity Name</label><input class="input" name="entity_name"></div>
          <div class="field"><label>Entity Id</label><input class="input" name="entity_id"></div>
          <div class="field"><label>Previous Status</label><input class="input" name="previous_status"></div>
          <div class="field"><label>New Status</label><input class="input" name="new_status"></div>
          <div class="field"><label>Ip Address</label><input class="input" name="ip_address"></div>
          <div class="field"><label>External Reference</label><input class="input" name="external_reference"></div>
          <div class="field"><label>Reason</label><input class="input" name="reason"></div>
        </div>
        <div class="flex" style="margin-top:14px"><button class="btn primary" onclick="create()">Create</button>
          <span id="msg" class="muted tiny"></span></div></section>
    </div></main></div>
<script>
const COLS=["trace_id", "actor_role", "action", "entity_name", "entity_id"];
async function load(){const r=await fetch('/api/audit_events');const j=await r.json();const rows=(j.data||[]);
  const tb=document.getElementById('rows');tb.replaceChildren();
  if(!rows.length){const tr=document.createElement('tr'),td=document.createElement('td');td.colSpan=COLS.length;td.className='muted';td.textContent='No audit_events yet.';tr.appendChild(td);tb.appendChild(tr);return;}
  for(const x of rows){const tr=document.createElement('tr');for(const c of COLS){const td=document.createElement('td');td.textContent=x[c]??'';tr.appendChild(td);}tb.appendChild(tr);}}
async function create(){const input={};document.querySelectorAll('#createCard [name]').forEach(el=>{if(el.value)input[el.name]=el.value;});
  const r=await fetch('/api/audit_events',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(input)});
  const j=await r.json();document.getElementById('msg').textContent=j.ok?'Created.':'Errors: '+JSON.stringify(j.errors||j.code);if(j.ok)load();}
load();
</script>
</body></html>
