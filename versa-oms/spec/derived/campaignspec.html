<!doctype html><html lang=en><head><meta charset=utf-8><title>Email Campaign — feature picker</title>
<style>
*{box-sizing:border-box}body{font-family:system-ui,Segoe UI,sans-serif;margin:0;background:#faf8ff;color:#2a2342}
.wrap{display:grid;grid-template-columns:1fr 420px;height:100vh}
.left{padding:22px;overflow:auto}.right{padding:22px;border-left:1px solid #e6e0f5;overflow:auto;background:#fff;position:sticky;top:0;height:100vh}
h1{font-size:18px;margin:0 0 4px}.sub{color:#8a82a8;font-size:12px;margin-bottom:14px}
#q{width:100%;padding:11px 13px;border:1px solid #e6e0f5;border-radius:11px;font-size:14px;margin-bottom:14px}
.cat{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:#9a92b5;font-weight:800;margin:18px 0 8px}
.card{border:1px solid #eee;border-radius:13px;padding:12px 14px;margin-bottom:9px;cursor:pointer;background:#fff;display:flex;gap:11px;align-items:flex-start}
.card:hover{border-color:#cdbcff}.card.on{border-color:#7c5cfc;background:#f6f2ff}.card.foc{box-shadow:0 0 0 3px #efeaff}
.card input{margin-top:3px;width:17px;height:17px;accent-color:#7c5cfc}
.card .nm{font-weight:700;font-size:14px}.card .ds{color:#6b6385;font-size:12px;margin-top:2px}
.badges{margin-top:6px}.bg{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;background:#eef;color:#5b54a8;margin:0 4px 4px 0}
.rec{font-size:10px;font-weight:800;color:#16a34a;margin-left:6px}
.pv-h{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:#9a92b5;font-weight:800;margin:6px 0 8px}
.pvbox{border:1px solid #e6e0f5;border-radius:14px;padding:16px;min-height:150px;background:#fbfaff}
.pv-name{font-weight:800;font-size:15px;margin-bottom:4px}.pv-desc{color:#6b6385;font-size:12.5px;margin-bottom:12px}
textarea{width:100%;height:200px;border:1px solid #e6e0f5;border-radius:11px;font-family:monospace;font-size:11px;padding:11px;margin-top:8px}
.cpy{margin-top:8px;padding:9px 15px;border:0;border-radius:9px;background:#3a3357;color:#fff;font-weight:700;cursor:pointer}
.count{color:#7c5cfc;font-weight:800;font-size:12px;margin-top:6px}
/* mockups */
.mk{border:1px solid #e3ddf3;border-radius:10px;padding:10px;background:#fff;font-size:12px}
.tb{border-bottom:1px solid #eee;padding-bottom:6px;margin-bottom:6px;color:#7c5cfc;letter-spacing:2px}
.pg{line-height:1.5}.tag{background:#efeaff;color:#7c5cfc;border-radius:4px;padding:1px 4px;font-family:monospace}
.blk{border:1px solid #e3ddf3;border-radius:7px;padding:7px 9px;margin:4px 0;color:#6b6385}.blk.dashed{border-style:dashed;color:#aaa}
.code{background:#2a2342;color:#c9c2ff;border-radius:7px;padding:9px;font-size:11px;margin:0}
.row{display:flex;gap:8px;flex-wrap:wrap}.thumb{flex:1;min-width:70px;border:1px solid #e3ddf3;border-radius:7px;padding:14px 8px;text-align:center;color:#6b6385;background:#fbfaff}
.ai{display:inline-block;background:#7c5cfc;color:#fff;border-radius:8px;padding:6px 11px;font-weight:700;margin-bottom:8px}
.chip{display:inline-block;background:#eef;color:#5b54a8;border-radius:999px;padding:4px 10px;font-size:11px;margin:0 5px 5px 0}
.imgb{width:48px;height:48px;border-radius:8px;border:1px solid #e3ddf3;display:grid;place-items:center;font-size:20px;background:#fbfaff}.imgb.dashed{border-style:dashed;color:#aaa}
.video{position:relative;width:120px;height:70px;border-radius:8px;background:#2a2342;color:#fff;display:grid;place-items:center;font-size:22px}.cap{font-size:11px;color:#7c5cfc;margin-top:5px}
.mail{border:1px solid #e3ddf3;border-radius:8px;overflow:hidden}.mh{background:#f3f0fb;padding:7px 9px;font-size:11px;color:#6b6385;border-bottom:1px solid #eee}.mb{padding:11px}.mb.small{font-size:11px}
.phone{width:120px;margin:auto;border:6px solid #2a2342;border-radius:18px;padding:8px 6px;position:relative}.notch{width:36px;height:5px;background:#2a2342;border-radius:3px;margin:0 auto 6px}
.btnm{display:inline-block;background:#7c5cfc;color:#fff;border-radius:6px;padding:4px 10px;font-size:10px;margin-top:6px}
.inp{border:1px solid #e3ddf3;border-radius:7px;padding:6px 9px;font-size:12px}.btn{display:inline-block;border:1px solid #d9d2ee;border-radius:7px;padding:6px 11px;font-size:12px;background:#fff;font-weight:700;color:#3a3357}.btn.pri{background:#7c5cfc;color:#fff;border:0}
.lr{padding:5px 0;border-bottom:1px solid #f2eefb;font-size:12px}.lr.strike{text-decoration:line-through;color:#aaa}.lr.dim{color:#bbb}.sel{margin-top:6px;color:#7c5cfc;font-weight:700;font-size:12px}
.cond{background:#fff7ed;border:1px solid #fed7aa;border-radius:7px;padding:8px;color:#9a3412;font-size:12px}
.gauge,.stat{background:#fbfaff;border:1px solid #e3ddf3;border-radius:8px;padding:9px 11px;font-size:12px}
.lane{border:1px solid #e3ddf3;border-radius:7px;padding:7px 9px;margin:4px 0;font-size:12px;color:#6b6385}
.heat{background:linear-gradient(90deg,#fee2e2,#fff);border-radius:7px;padding:9px;font-size:12px}
.foot{border-top:1px solid #eee;padding-top:7px;color:#8a82a8;font-size:11px}
.prov{font-weight:700;font-size:13px}.play{position:absolute}
.tabs .tab{display:inline-block;font-size:11px;padding:3px 9px;border:1px solid #e3ddf3;border-radius:6px;margin-right:4px;color:#6b6385}.tabs .tab.on{background:#7c5cfc;color:#fff;border:0}
</style></head><body>
<div class=wrap>
 <div class=left><h1>Email Campaign — feature picker</h1>
  <div class=sub>Click a feature to preview it &rarr;. Tick <b>Include</b> for what the page should have. Recommended are pre-ticked. Copy the JSON back to me and I build OJ-O3 from exactly that scope.</div>
  <input id=q placeholder="Search features (e.g. preview, attach, schedule, brevo)…" oninput=render()>
  <div id=list></div>
 </div>
 <div class=right>
  <div class=pv-h>Preview</div>
  <div class=pvbox id=pv><div class=pv-desc>Click a feature on the left to see how it looks.</div></div>
  <div class=pv-h style="margin-top:18px">Your scope (JSON)</div>
  <textarea id=out readonly></textarea>
  <div class=count id=count></div>
  <button class=cpy onclick="navigator.clipboard.writeText(document.getElementById('out').value)">Copy JSON</button>
 </div>
</div>
<script>
const DATA=[{"cat": "Editor", "key": "rich_editor", "name": "Rich-text (WYSIWYG) editor", "src": ["Brevo", "Mailchimp", "SendGrid"], "rec": true, "desc": "Format text/links/images visually \u2014 no code.", "preview": "<div class=mk><div class=tb><b>B</b><i>I</i><u>U</u> | A | &#128279; | &#128247;</div><div class=pg>Dear {{school_name}}, we invite <b>your school</b> to the 2026 Olympiad\u2026</div></div>"}, {"cat": "Editor", "key": "drag_blocks", "name": "Drag-and-drop blocks", "src": ["Brevo", "Mailchimp"], "rec": true, "desc": "Build the email from stackable blocks.", "preview": "<div class=mk><div class=blk>&#9776; Header</div><div class=blk>&#9776; Text</div><div class=blk>&#9776; Image</div><div class=blk>&#9776; Button</div><div class=blk dashed>+ add block</div></div>"}, {"cat": "Editor", "key": "html_paste", "name": "Paste / edit raw HTML", "src": ["Brevo", "SendGrid", "Mailchimp", "Listmonk"], "rec": true, "desc": "Paste a designed HTML email or hand-edit.", "preview": "<div class=mk><pre class=code>&lt;table&gt;&lt;tr&gt;&lt;td&gt;\n  &lt;h1&gt;Olympiad 2026&lt;/h1&gt;\n&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;</pre></div>"}, {"cat": "Editor", "key": "templates", "name": "Saved templates", "src": ["Brevo", "Mailchimp", "SendGrid", "Listmonk"], "rec": true, "desc": "Reusable starting layouts.", "preview": "<div class=mk><div class=row><div class=thumb>Invite</div><div class=thumb>Reminder</div><div class=thumb>Results</div></div></div>"}, {"cat": "Editor", "key": "ai_draft", "name": "AI-drafted content (paste in)", "src": ["Brevo", "Mailchimp"], "rec": false, "desc": "You generate copy/images elsewhere and attach here.", "preview": "<div class=mk><div class=ai>&#10024; Generate draft &rarr;</div><div class=pg>Draft inserted into the body\u2026</div></div>"}, {"cat": "Attachments", "key": "attach_files", "name": "File attachments (PDF)", "src": ["SendGrid", "Listmonk"], "rec": false, "desc": "Attach a file. Brevo prefers a hosted link (deliverability).", "preview": "<div class=mk><span class=chip>&#128206; brochure.pdf 1.2MB &times;</span><span class=chip>&#128206; flyer.pdf &times;</span></div>"}, {"cat": "Attachments", "key": "image_host", "name": "Hosted image library", "src": ["Brevo", "Mailchimp"], "rec": true, "desc": "Upload images; emails reference hosted URLs.", "preview": "<div class=mk><div class=row><div class=imgb>&#128247;</div><div class=imgb>&#128247;</div><div class=imgb dashed>+</div></div></div>"}, {"cat": "Attachments", "key": "video_thumb", "name": "Video = thumbnail + link", "src": ["best-practice"], "rec": true, "desc": "Email can't autoplay video \u2014 embed a play thumbnail linking to it.", "preview": "<div class=mk><div class=video>&#9654;<div class=play></div></div><div class=cap>Watch the 60s intro &rarr;</div></div>"}, {"cat": "Preview & test", "key": "preview_desktop", "name": "Desktop preview", "src": ["Brevo", "Mailchimp", "SendGrid", "Listmonk"], "rec": true, "desc": "See the email as a desktop client renders it.", "preview": "<div class=mk><div class=mail><div class=mh>From: Versa \u00b7 Subject: Olympiad 2026</div><div class=mb>Dear school, \u2026</div></div></div>"}, {"cat": "Preview & test", "key": "preview_mobile", "name": "Mobile preview", "src": ["Brevo", "Mailchimp"], "rec": true, "desc": "See the mobile rendering.", "preview": "<div class=mk><div class=phone><div class=notch></div><div class=mb small>Dear school,<br>\u2026<br><span class=btnm>Register</span></div></div></div>"}, {"cat": "Preview & test", "key": "send_test", "name": "Send a test email", "src": ["Brevo", "Mailchimp", "SendGrid", "Listmonk"], "rec": true, "desc": "Send a test to yourself before the real send.", "preview": "<div class=mk><input class=inp value='me@versa.example' readonly> <span class=btn>Send test</span></div>"}, {"cat": "Preview & test", "key": "inbox_preview", "name": "Inbox rendering (Gmail/Outlook)", "src": ["Litmus/premium"], "rec": false, "desc": "Cross-client rendering preview (paid integration).", "preview": "<div class=mk><div class=tabs><span class='tab on'>Gmail</span><span class=tab>Outlook</span><span class=tab>Apple</span></div><div class=mb>rendered\u2026</div></div>"}, {"cat": "Preview & test", "key": "spam_score", "name": "Spam-score check", "src": ["Mailchimp", "SendGrid"], "rec": false, "desc": "Score the email for spam triggers before sending.", "preview": "<div class=mk><div class=gauge>Spam score <b style='color:#16a34a'>1.2/10</b> &#9989; good</div></div>"}, {"cat": "Personalization", "key": "merge_tags", "name": "Merge tags ({{school_name}})", "src": ["Brevo", "Mailchimp", "SendGrid", "Listmonk"], "rec": true, "desc": "Per-recipient fields in subject/body.", "preview": "<div class=mk><div class=pg>Hi <span class=tag>{{school_name}}</span> in <span class=tag>{{city}}</span> \u2014</div></div>"}, {"cat": "Personalization", "key": "conditional", "name": "Conditional content", "src": ["Brevo", "SendGrid"], "rec": false, "desc": "Show/hide blocks by recipient attribute.", "preview": "<div class=mk><div class=cond>IF state = Karnataka &rarr; show <i>regional venue</i></div></div>"}, {"cat": "Recipients", "key": "directory_select", "name": "Target schools from the directory", "src": ["Versa BRD"], "rec": true, "desc": "Select rows in the directory -> campaign targets (built).", "preview": "<div class=mk><div class=lr><input type=checkbox checked> Greenwood High</div><div class=lr><input type=checkbox checked> Sunrise Academy</div><div class=sel>2 selected &rarr; campaign</div></div>"}, {"cat": "Recipients", "key": "segments", "name": "Segments / filters", "src": ["Brevo", "Mailchimp", "SendGrid", "Listmonk"], "rec": true, "desc": "Target by status/source/state instead of a manual pick.", "preview": "<div class=mk><span class=chip>status: prospect</span><span class=chip>state: MH</span><span class=chip>not unsubscribed</span></div>"}, {"cat": "Recipients", "key": "suppression", "name": "Suppress unsubscribed / bounced", "src": ["Brevo", "Mailchimp", "SendGrid", "Listmonk"], "rec": true, "desc": "Never email opt-outs or hard-bounces (built).", "preview": "<div class=mk><div class=lr strike>blocked@x \u2014 unsubscribed</div><div class=lr strike>bad@x \u2014 bounced</div></div>"}, {"cat": "Recipients", "key": "dedup", "name": "De-duplicate by email", "src": ["best-practice"], "rec": true, "desc": "One email per address even across lists (built in import).", "preview": "<div class=mk><div class=lr>a@x</div><div class=lr dim>a@x (dup, skipped)</div></div>"}, {"cat": "Sending", "key": "send_now", "name": "Send now", "src": ["Brevo", "Mailchimp", "SendGrid", "Listmonk"], "rec": true, "desc": "Send immediately to the targets (Mode A, built).", "preview": "<div class=mk><span class=btn pri>&#9993; Send now to 2</span></div>"}, {"cat": "Sending", "key": "schedule", "name": "Schedule for later", "src": ["Brevo", "Mailchimp", "SendGrid", "Listmonk"], "rec": true, "desc": "Pick a date/time; sends automatically.", "preview": "<div class=mk><input class=inp value='2026-07-01  09:00' readonly> <span class=btn>Schedule</span></div>"}, {"cat": "Sending", "key": "send_time_opt", "name": "Send-time optimization", "src": ["Brevo", "Mailchimp"], "rec": false, "desc": "Auto-pick the best send time per recipient.", "preview": "<div class=mk><div class=gauge>&#128336; Best time: <b>Tue 10:00</b></div></div>"}, {"cat": "Sending", "key": "throttle", "name": "Throttle / rate limit", "src": ["SendGrid", "Listmonk"], "rec": true, "desc": "Spread a large send to protect deliverability (gateway 429-aware, built).", "preview": "<div class=mk><div class=gauge>Rate: <b>600/hour</b> &#9201;</div></div>"}, {"cat": "Sending", "key": "ab_test", "name": "A/B test (subject/content)", "src": ["Brevo", "Mailchimp", "SendGrid"], "rec": false, "desc": "Test variants; send the winner to the rest.", "preview": "<div class=mk><div class=row><div class=thumb>A: 'Invite'</div><div class=thumb>B: 'Last call'</div></div></div>"}, {"cat": "Sending", "key": "create_in_brevo", "name": "Create in Brevo (design+send there)", "src": ["Brevo", "Versa gateway"], "rec": true, "desc": "Push targets + shell to Brevo's editor; finish/send there (Mode B, built).", "preview": "<div class=mk><span class=btn>&#129106; Create in Brevo</span><div class=cap>opens Brevo editor with your list</div></div>"}, {"cat": "Sending", "key": "channels", "name": "Transactional vs marketing channels", "src": ["Versa gateway BRD"], "rec": true, "desc": "Separate provider per channel; gateway abstracts it (built).", "preview": "<div class=mk><div class=lane>Transactional &rarr; provider X</div><div class=lane>Marketing &rarr; provider Y</div></div>"}, {"cat": "Tracking", "key": "track_opens", "name": "Open tracking", "src": ["Brevo", "Mailchimp", "SendGrid", "Listmonk"], "rec": true, "desc": "Who opened (built via webhook -> email_sends).", "preview": "<div class=mk><div class=stat>&#128065; Opens <b>64%</b></div></div>"}, {"cat": "Tracking", "key": "track_clicks", "name": "Click tracking", "src": ["Brevo", "Mailchimp", "SendGrid", "Listmonk"], "rec": true, "desc": "Who clicked which link.", "preview": "<div class=mk><div class=stat>&#128279; Clicks <b>21%</b></div></div>"}, {"cat": "Tracking", "key": "track_bounce", "name": "Bounce / unsubscribe tracking", "src": ["Brevo", "Mailchimp", "SendGrid", "Listmonk"], "rec": true, "desc": "Bounces + opt-outs feed suppression (built).", "preview": "<div class=mk><div class=stat>&#9888; Bounced <b>2%</b> \u00b7 Unsub <b>0.4%</b></div></div>"}, {"cat": "Tracking", "key": "heatmap", "name": "Click heatmap", "src": ["Mailchimp", "Brevo"], "rec": false, "desc": "Visual map of where recipients clicked.", "preview": "<div class=mk><div class=heat>&#128293; CTA hot \u00b7 footer cold</div></div>"}, {"cat": "Tracking", "key": "per_recipient", "name": "Per-recipient status feed", "src": ["Versa BRD"], "rec": true, "desc": "Each school's queued/delivered/opened (OJ-O4, built).", "preview": "<div class=mk><div class=lr>Greenwood \u2014 delivered</div><div class=lr>Sunrise \u2014 opened</div></div>"}, {"cat": "Deliverability", "key": "sender_domain", "name": "Verified sender domain (SPF/DKIM)", "src": ["Brevo", "Mailchimp", "SendGrid", "Listmonk"], "rec": true, "desc": "Authenticate the domain so you land in inbox.", "preview": "<div class=mk><div class=stat>&#9989; versa-olympiads.org \u2014 SPF/DKIM verified</div></div>"}, {"cat": "Deliverability", "key": "unsub_link", "name": "Unsubscribe link + List-Unsubscribe", "src": ["Brevo", "Mailchimp", "SendGrid", "Listmonk"], "rec": true, "desc": "Legally required one-click opt-out in every send.", "preview": "<div class=mk><div class=foot>You receive this as a school contact. <u>Unsubscribe</u></div></div>"}, {"cat": "Deliverability", "key": "consent_gdpr", "name": "Consent / data-protection note", "src": ["best-practice/legal"], "rec": true, "desc": "Record consent basis; honor erasure.", "preview": "<div class=mk><div class=foot>Sent on legitimate-interest basis \u00b7 privacy policy</div></div>"}, {"cat": "Providers", "key": "prov_brevo", "name": "Brevo (our default)", "src": ["Brevo"], "rec": true, "desc": "Contacts import, campaigns, transactional, webhooks (built).", "preview": "<div class=mk><div class=prov>Brevo &#9989; list+campaign+webhook</div></div>"}, {"cat": "Providers", "key": "prov_sendgrid", "name": "SendGrid", "src": ["SendGrid"], "rec": false, "desc": "Strong transactional + API; marketing campaigns too.", "preview": "<div class=mk><div class=prov>SendGrid \u2014 transactional-first</div></div>"}, {"cat": "Providers", "key": "prov_mailchimp", "name": "Mailchimp", "src": ["Mailchimp"], "rec": false, "desc": "Best editor/automation; pricier.", "preview": "<div class=mk><div class=prov>Mailchimp \u2014 editor/automation</div></div>"}, {"cat": "Providers", "key": "prov_listmonk", "name": "Listmonk (self-hosted, open-source)", "src": ["Listmonk"], "rec": false, "desc": "Free, self-hosted, high-volume; you run it.", "preview": "<div class=mk><div class=prov>Listmonk \u2014 self-hosted, free</div></div>"}, {"cat": "Providers", "key": "prov_gateway", "name": "Provider-agnostic gateway (our design)", "src": ["Versa"], "rec": true, "desc": "Swap providers via env; one interface (built).", "preview": "<div class=mk><div class=prov>Gateway &rarr; Brevo | SendGrid | Mailchimp | Listmonk</div></div>"}];const SEL={};DATA.forEach(f=>SEL[f.key]=f.rec);let FOC=null;
function render(){const q=document.getElementById('q').value.toLowerCase();const L=document.getElementById('list');L.replaceChildren();
 const cats=[...new Set(DATA.map(f=>f.cat))];
 for(const c of cats){const items=DATA.filter(f=>f.cat===c&&(!q||(f.name+' '+f.desc+' '+f.src.join(' ')).toLowerCase().includes(q)));if(!items.length)continue;
  const h=document.createElement('div');h.className='cat';h.textContent=c;L.appendChild(h);
  for(const f of items){const card=document.createElement('div');card.className='card'+(SEL[f.key]?' on':'')+(FOC===f.key?' foc':'');
   const cb=document.createElement('input');cb.type='checkbox';cb.checked=!!SEL[f.key];cb.addEventListener('click',e=>e.stopPropagation());cb.addEventListener('change',()=>{SEL[f.key]=cb.checked;render();out();});
   const body=document.createElement('div');body.style.flex='1';
   const nm=document.createElement('div');nm.className='nm';nm.innerHTML=f.name+(f.rec?' <span class=rec>RECOMMENDED</span>':'');
   const ds=document.createElement('div');ds.className='ds';ds.textContent=f.desc;
   const bd=document.createElement('div');bd.className='badges';f.src.forEach(s=>{const b=document.createElement('span');b.className='bg';b.textContent=s;bd.appendChild(b);});
   body.append(nm,ds,bd);card.append(cb,body);
   card.addEventListener('click',()=>{FOC=f.key;preview(f);render();});
   L.appendChild(card);}}
}
function preview(f){const p=document.getElementById('pv');p.innerHTML='<div class=pv-name>'+f.name+'</div><div class=pv-desc>'+f.desc+'</div>'+f.preview;}
function out(){const o={};DATA.forEach(f=>{if(SEL[f.key]){(o[f.cat]=o[f.cat]||[]).push(f.key);}});
 const providers=(o['Providers']||[]).map(k=>k.replace('prov_',''));
 const json={include:o,providers,excluded:DATA.filter(f=>!SEL[f.key]).map(f=>f.key),notes:""};
 document.getElementById('out').value=JSON.stringify(json,null,2);
 document.getElementById('count').textContent=Object.values(SEL).filter(Boolean).length+' of '+DATA.length+' features included';}
render();out();
</script></body></html>
